services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - fastf1_cache:/app/fastf1_cache
    restart: unless-stopped

  frontend:
    build: ./frontend
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "8780:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  fastf1_cache:
